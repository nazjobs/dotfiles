# Input wiki https://wiki.hyprland.org/Configuring/Variables/#input
# CORRECTED VERSION
input {
    # kb_layout = us, et
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = -0.025 # -1.0 - 1.0, 0 means no modification.
}

