# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #

# Force Notepad++ (running under Wine) to be tiled
windowrule {
  name = windowrule-1
  tile = on
  match:class = ^(notepad++)$
}


# Force Notepad++ (running under Wine) to be tiled
windowrule {
  name = windowrule-2
  tile = on
  match:class = ^(sumatra)$
}


# Float zen-browser's download mini popup
windowrule {
  name = windowrule-3
  float = on
  match:class = ^(?i)zen$
  match:title = ^(?i)library$
}


# Float flameshot's weird double window
windowrule {
  name = windowrule-4
  float = on
  match:class = ^(?i)flameshot$
  match:title = ^(?i)flameshot$
}



